              examples:
                GetCompatibleKafkaVersions482Example:
                  summary: Default GetCompatibleKafkaVersions 482 response
                  x-microcks-default: true
                  value: {}
        '483':
          description: ForbiddenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
              examples:
                GetCompatibleKafkaVersions483Example:
                  summary: Default GetCompatibleKafkaVersions 483 response
                  x-microcks-default: true
                  value: {}
        '484':
          description: NotFoundException
          content:
            application/json:
              schema:
