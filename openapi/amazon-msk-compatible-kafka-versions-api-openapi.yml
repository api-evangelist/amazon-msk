    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: GetCompatibleKafkaVersions
      description: "\n            <p>Gets the Apache Kafka versions to which you can update the MSK cluster.</p>"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCompatibleKafkaVersionsResponse'
              examples:
                GetCompatibleKafkaVersions200Example:
                  summary: Default GetCompatibleKafkaVersions 200 response
                  x-microcks-default: true
                  value:
                    CompatibleKafkaVersions: example-value
        '480':
          description: BadRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestException'
              examples:
                GetCompatibleKafkaVersions480Example:
                  summary: Default GetCompatibleKafkaVersions 480 response
                  x-microcks-default: true
                  value: {}
        '481':
          description: UnauthorizedException
          content:
