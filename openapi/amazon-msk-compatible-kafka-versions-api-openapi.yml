              examples:
                GetCompatibleKafkaVersions484Example:
                  summary: Default GetCompatibleKafkaVersions 484 response
                  x-microcks-default: true
                  value: {}
        '485':
          description: ServiceUnavailableException
          content:
            application/json:
              schema:
