components:
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
  schemas:
    __listOf__string:
      type: array
      items:
        $ref: '#/components/schemas/__string'
    CompatibleKafkaVersion:
      type: object
      properties:
        SourceVersion:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: sourceVersion
            description: "\n            <p>An Apache Kafka version.</p>"
        TargetVersions:
          allOf:
          - $ref: '#/components/schemas/__listOf__string'
          - xml:
              name: targetVersions
            description: "\n            <p>A list of Apache Kafka versions.</p>"
      description: "\n            <p>Contains source Apache Kafka versions and compatible target Apache Kafka versions.</p>"
    GetCompatibleKafkaVersionsResponse:
      type: object
      properties:
        CompatibleKafkaVersions:
          allOf:
          - $ref: '#/components/schemas/__listOfCompatibleKafkaVersion'
          - xml:
              name: compatibleKafkaVersions
            description: "\n            <p>A list of CompatibleKafkaVersion objects.</p>"
    InternalServerErrorException: {}
    ForbiddenException: {}
    UnauthorizedException: {}
    BadRequestException: {}
    NotFoundException: {}
    ServiceUnavailableException: {}
    __listOfCompatibleKafkaVersion:
      type: array
      items:
        $ref: '#/components/schemas/CompatibleKafkaVersion'
    TooManyRequestsException: {}
    __string:
      type: string
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
