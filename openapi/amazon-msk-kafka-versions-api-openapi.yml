    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: ListKafkaVersions
      description: "\n            <p>Returns a list of Apache Kafka versions.</p>"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListKafkaVersionsResponse'
              examples:
                ListKafkaVersions200Example:
                  summary: Default ListKafkaVersions 200 response
                  x-microcks-default: true
                  value:
                    KafkaVersions: example-value
                    NextToken: example-value
        '480':
          description: BadRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestException'
              examples:
                ListKafkaVersions480Example:
                  summary: Default ListKafkaVersions 480 response
                  x-microcks-default: true
                  value: {}
        '481':
          description: UnauthorizedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedException'
              examples:
                ListKafkaVersions481Example:
                  summary: Default ListKafkaVersions 481 response
                  x-microcks-default: true
                  value: {}
        '482':
          description: InternalServerErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorException'
              examples:
                ListKafkaVersions482Example:
                  summary: Default ListKafkaVersions 482 response
                  x-microcks-default: true
                  value: {}
        '483':
          description: ForbiddenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
              examples:
                ListKafkaVersions483Example:
                  summary: Default ListKafkaVersions 483 response
                  x-microcks-default: true
                  value: {}
      parameters:
      - name: maxResults
        in: query
        required: false
        description: "\n            <p>The maximum number of results to return in the response. If there are more results, the response includes a NextToken parameter.</p>"
        schema:
          type: integer
          minimum: 1
          maximum: 100
      - name: nextToken
        in: query
        required: false
        description: "\n            <p>The paginated results marker. When the result of the operation is truncated, the call returns NextToken in the response. To get the next batch, provide this token in your next request.</p>"
        schema:
          type: string
      - name: MaxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      summary: Amazon MSK List Kafka Versions
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
