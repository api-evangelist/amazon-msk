              name: kafkaVersions
        NextToken:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: nextToken
    KafkaVersionStatus:
      type: string
      enum:
      - ACTIVE
      - DEPRECATED
    InternalServerErrorException: {}
    KafkaVersion:
      type: object
      properties:
        Version:
          allOf:
