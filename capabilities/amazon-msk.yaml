        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listclustersv2
        description: Amazon MSK List Clusters V2
        call: amazon-msk.listclustersv2
        with:
          clusterNameFilter: rest.clusterNameFilter
          clusterTypeFilter: rest.clusterTypeFilter
          maxResults: rest.maxResults
          nextToken: rest.nextToken
          MaxResults: rest.MaxResults
          NextToken: rest.NextToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/clusters/{clusterarn}
      name: api-v2-clusters-clusterarn
      description: REST surface for api-v2-clusters-clusterArn.
      operations:
      - method: GET
        name: describeclusterv2
        description: Amazon MSK Describe Cluster V2
