        name: createcluster
        description: Amazon MSK Create Cluster
        call: amazon-msk.createcluster
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listclusters
        description: Amazon MSK List Clusters
        call: amazon-msk.listclusters
        with:
          clusterNameFilter: rest.clusterNameFilter
          maxResults: rest.maxResults
          nextToken: rest.nextToken
          MaxResults: rest.MaxResults
          NextToken: rest.NextToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/clusters/{clusterarn}
      name: v1-clusters-clusterarn
      description: REST surface for v1-clusters-clusterArn.
      operations:
      - method: DELETE
        name: deletecluster
